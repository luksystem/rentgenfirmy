openapi: 3.0.3
info:
  title: Loxone Miniserver API
  description: |
    HTTP/WebSocket API for communicating with the Loxone Miniserver smart home controller.

    Based on official Loxone documentation **V17.0 (31.03.2026)**.

    ## Transport

    | Protocol | Usage |
    |---|---|
    | HTTP / HTTPS | Commands, token acquisition, file downloads |
    | WS / WSS | Real-time state updates, control commands |

    HTTPS/WSS is supported on **Miniserver Gen 2+** only.

    ## Command prefix

    - `jdev/` → JSON response ✅ (recommended)
    - `dev/` → XML response ❌ (deprecated)

    Note: responses always echo `dev/` in the `control` field even when `jdev/` was used.

    ## Authentication flow

    1. `GET /jdev/cfg/apiKey` — verify reachability
    2. `GET /jdev/sys/getPublicKey` — get RSA public key
    3. `GET /jdev/sys/getkey2/{user}` — get HMAC key + salt
    4. Hash: `pwHash = SHA256("{password}:{userSalt}").toUpperCase()`
    5. Hash: `hash = HMAC-SHA256("{user}:{pwHash}", key)`
    6. `GET /jdev/sys/enc/{enc(getjwt/...)}?sk={encSessionKey}` — acquire JWT (must be encrypted)
    7. Subsequent HTTP requests: append `?autht={tokenHash}&user={user}`

    ## WebSocket endpoint

    `ws://{host}:{port}/ws/rfc6455` with `Sec-WebSocket-Protocol: remotecontrol`

    After WebSocket auth, send `jdev/sps/enablebinstatusupdate` to receive live state events.

  version: "17.0"
  contact:
    url: https://www.loxone.com/enen/kb/api/

servers:
  - url: http://{host}:{port}
    description: Miniserver HTTP (Gen 1 & Gen 2)
    variables:
      host:
        default: "192.168.1.77"
        description: Miniserver local IP or hostname
      port:
        default: "80"
        description: HTTP port (default 80)
  - url: https://{hostname}:{port}
    description: Miniserver HTTPS (Gen 2+ with CloudDNS certificate)
    variables:
      hostname:
        default: "192-168-1-77.{serialNumber}.dyndns.loxonecloud.com"
        description: |
          CloudDNS hostname for TLS. Construct as:
          {cleaned-ip}.{snr}.dyndns.loxonecloud.com
          where cleaned-ip replaces dots with dashes.
      port:
        default: "443"
        description: HTTPS port

tags:
  - name: Connectivity
    description: Reachability checks and API info
  - name: Security
    description: Certificate retrieval, key exchange, command encryption
  - name: Authentication
    description: JWT token lifecycle — acquire, refresh, verify, kill
  - name: Controls
    description: Send commands to controls/function blocks via UUID
  - name: VirtualIO
    description: |
      Virtual Inputs/Outputs by **name** (not UUID). The classic webservice interface —
      address controls by their name from Loxone Config. Also covers the API Connector
      `SET()` commands used by Touch Pure Flex and external systems (Node-RED, PLCs, etc.)
  - name: Structure
    description: Structure file download and version check
  - name: System
    description: |
      System monitoring, PLC control, system configuration, date/time,
      reboot, file system access, and system logs.
  - name: CloudDNS
    description: |
      External address resolution via `connect.loxonecloud.com`.
      Use to find the current IP/port of a Miniserver behind NAT, or to resolve
      a Remote Connect (V17.0+) tunnel address.

paths:

  # ─── CONNECTIVITY ────────────────────────────────────────────────────────────

  /jdev/cfg/apiKey:
    get:
      operationId: getApiKey
      summary: Reachability Check & API Info
      description: |
        First call in any connection sequence. No authentication required.
        Returns serial number, firmware version, HTTPS support status, local flag,
        and WebSocket event slot availability.

        Since v12.1: response contains `local` attribute indicating whether the
        Miniserver considers this connection local (affects access restrictions).

        Since v17.0: response contains `hasEventSlots` (max 31 concurrent WS clients).
      tags: [Connectivity]
      security: []
      responses:
        '200':
          description: Miniserver is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
              example:
                LL:
                  control: "dev/cfg/apiKey"
                  value:
                    snr: "504F94A1B2C3"
                    version: "17.0.12.11"
                    httpsStatus: 1
                    local: true
                    hasEventSlots: true
                  Code: "200"

  /jdev/cfg/api:
    get:
      operationId: getApiInfo
      summary: Extended API Info
      description: Extended version of apiKey with additional Miniserver metadata.
      tags: [Connectivity]
      security: []
      responses:
        '200':
          description: Extended Miniserver info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'

  # ─── SECURITY ────────────────────────────────────────────────────────────────

  /jdev/sys/getcertificate:
    get:
      operationId: getCertificate
      summary: Get Miniserver TLS Certificate Chain
      description: |
        Returns the full TLS certificate chain in PEM format.

        Verify the chain against the stored **Loxone Root Certificate** stored on the client.
        The root certificate is always the first in the chain.

        Extract the public key from the **last certificate** for WebSocket AES session key exchange.
        Required for establishing WSS connections.
      tags: [Security]
      security: []
      responses:
        '200':
          description: PEM-encoded certificate chain
          content:
            text/plain:
              schema:
                type: string
                description: PEM certificate chain (multiple -----BEGIN CERTIFICATE----- blocks)

  /jdev/sys/getPublicKey:
    get:
      operationId: getPublicKey
      summary: Get RSA Public Key
      description: |
        Returns the Miniserver RSA public key for AES session key exchange and command encryption.

        Format: **X.509 / ANS.1** PEM encoding.

        Use this key to RSA-encrypt your AES session key before sending it to the Miniserver.
        Encryption parameters: RSA/ECB/PKCS1, result Base64-encoded with no line wraps.
      tags: [Security]
      security: []
      responses:
        '200':
          description: RSA public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/getPublicKey"
                  value: "-----BEGIN CERTIFICATE-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8A..."
                  Code: "200"

  /jdev/sys/keyexchange/{encryptedSessionKey}:
    get:
      operationId: keyExchange
      summary: Exchange AES Session Key (WebSocket Setup)
      description: |
        Deliver the RSA-encrypted AES session key and IV to the Miniserver during WebSocket setup.

        **Step sequence (WebSocket connection):**
        1. Generate AES256 key → `{key}` (hex)
        2. Generate random 16-byte AES IV → `{iv}` (hex)
        3. RSA-encrypt `"{key}:{iv}"` with Miniserver public key → Base64
        4. Send this endpoint over the WebSocket

        After this, encrypt all sensitive WebSocket commands using the negotiated AES key.
      tags: [Security]
      parameters:
        - name: encryptedSessionKey
          in: path
          required: true
          description: |
            RSA-encrypted session key. Payload: `"{aesKey}:{aesIV}"` both hex.
            Encryption: RSA/ECB/PKCS1. Encoding: Base64 no-wrap.
          schema:
            type: string
      responses:
        '200':
          description: Key exchange acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sys/enc/{encryptedCommand}:
    get:
      operationId: sendEncryptedCommand
      summary: Send Encrypted Command (Plaintext Response)
      description: |
        Wrap any command in AES256-CBC encryption. Miniserver decrypts and executes the inner command.
        Response is the normal plaintext/JSON result of the inner command.

        **Encryption steps (HTTP):**
        1. Prepare inner command: `{cmd}` (e.g. `jdev/sps/io/{uuid}/On`)
        2. Prepend salt: `"salt/{salt}/{cmd}"` → plaintext
        3. AES256-CBC encrypt (key + IV from session) → Base64 (no wrap)
        4. URI-component-encode → `{encryptedCommand}`
        5. RSA-encrypt `"{key}:{iv}"` → Base64 → URI-encode → `{encSessionKey}`
        6. Append `?sk={encSessionKey}` to URL

        **Over WebSocket:** use key/IV negotiated via `keyexchange`. No `?sk=` needed.

        **Commands that cannot be encrypted:**
        - Icons/images (`.svg`, `.png`, `camimage`)
        - Files (`LoxAPP3.json`, `fsget`, `fslist`) — except `enc` is supported for LoxAPP3.json
        - Statistic files and data
      tags: [Security]
      parameters:
        - name: encryptedCommand
          in: path
          required: true
          description: AES256-CBC encrypted inner command, Base64, URI-encoded
          schema:
            type: string
        - name: sk
          in: query
          description: RSA-encrypted AES session key (Base64, URI-encoded). Required for HTTP; omit on WebSocket.
          schema:
            type: string
      responses:
        '200':
          description: Result of the decrypted inner command
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
        '401':
          description: Decryption failed — invalid key or unexpected salt

  /jdev/sys/fenc/{encryptedCommand}:
    get:
      operationId: sendFullyEncryptedCommand
      summary: Send Encrypted Command (Encrypted Response)
      description: |
        Like `/jdev/sys/enc/` but the Miniserver **also AES-encrypts the response**.
        Decrypt the Base64 response body using your AES session key and IV.

        The MIME type of the inner response is preserved after decryption.
        Useful for sensitive reads where the response should not be visible in transit.
      tags: [Security]
      parameters:
        - name: encryptedCommand
          in: path
          required: true
          description: AES256-CBC encrypted inner command, Base64, URI-encoded
          schema:
            type: string
        - name: sk
          in: query
          description: RSA-encrypted AES session key (HTTP only)
          schema:
            type: string
      responses:
        '200':
          description: AES-encrypted response (Base64). Decrypt with your session key + IV.
          content:
            text/plain:
              schema:
                type: string
                description: Base64-encoded AES-CBC ciphertext of the inner response

  /jdev/sys/getvisusalt/{user}:
    get:
      operationId: getVisuSalt
      summary: Get Visualization Password Salt
      description: |
        Retrieve the key, salt, and hash algorithm needed to hash a visualization password.
        Required before sending a secured control command via `/jdev/sps/ios/`.

        **Visu password hash creation:**
        1. `visuPwHash = {hashAlg}("{visuPw}:{salt}").toUpperCase()`
        2. `visuHash = HMAC-{hashAlg}(visuPwHash, key)` → hex
      tags: [Security]
      parameters:
        - name: user
          in: path
          required: true
          description: Username whose visualization password is being used
          schema:
            type: string
      responses:
        '200':
          description: Salt, key, and hash algorithm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/getvisusalt/admin"
                  value:
                    key: "ab12cd3e..."
                    salt: "ef34gh"
                    hashAlg: "SHA256"
                  Code: "200"

  /jdev/sps/checkuservisupwd/{hash}:
    get:
      operationId: checkUserVisuPwd
      summary: Verify Visualization Password
      description: |
        Verify a visualization password hash without triggering any control function.
        Returns 200 if correct, 500 if incorrect.

        Use the same hash construction as for `/jdev/sps/ios/`.
      tags: [Security]
      parameters:
        - name: hash
          in: path
          required: true
          description: HMAC hash of the visualization password (see getvisusalt)
          schema:
            type: string
      responses:
        '200':
          description: Visualization password is correct
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
        '500':
          description: Incorrect visualization password

  # ─── AUTHENTICATION ───────────────────────────────────────────────────────────

  /jdev/sys/getkey:
    get:
      operationId: getKey
      summary: Get HMAC Key (legacy)
      description: |
        Get the one-time HMAC key used for token authentication hashes.
        Prefer `getkey2` for new token acquisition; use this only for `authwithtoken` hashes.

        The returned hex key may need to be decoded to ASCII before HMAC use.
      tags: [Authentication]
      security: []
      responses:
        '200':
          description: HMAC key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/getkey"
                  value: "3a4f5e6b7c..."
                  Code: "200"

  /jdev/sys/getkey2/{user}:
    get:
      operationId: getKey2
      summary: Get Key + Salt for Token Acquisition
      description: |
        Returns key, userSalt, and hash algorithm for hashing credentials prior to JWT acquisition.

        **Password hash creation:**
        1. `pwHash = {hashAlg}("{password}:{userSalt}").toUpperCase()`
        2. `hash = HMAC-{hashAlg}("{user}:{pwHash}", key)` — leave as-is (no case conversion)

        Use the `hash` in `getjwt`.
      tags: [Authentication]
      security: []
      parameters:
        - name: user
          in: path
          required: true
          description: Username for whom the token will be acquired
          schema:
            type: string
      responses:
        '200':
          description: Key, userSalt, and hash algorithm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/getkey2/admin"
                  value:
                    key: "3a4f5e6b7c..."
                    salt: "ab12cd"
                    hashAlg: "SHA256"
                  Code: "200"

  /jdev/sys/getjwt/{hash}/{user}/{permission}/{uuid}/{info}:
    get:
      operationId: getJwt
      summary: Acquire JWT Token
      description: |
        Acquire a JSON Web Token. **This request MUST be sent via `/jdev/sys/enc/`** (AES encrypted).
        Unencrypted `getjwt` requests are rejected with HTTP 400.

        **Token lifespan by permission:**
        | Permission | Value | Lifespan |
        |---|---|---|
        | Web | 2 | Short (hours) |
        | App | 4 | Long (weeks) |

        Since v12.2: you may use an existing token hash instead of a password hash.
        Append `?authHash=True` to the command when using a token hash as `{hash}`.
      tags: [Authentication]
      parameters:
        - name: hash
          in: path
          required: true
          description: |
            HMAC of `"{user}:{pwHash}"` using key from getkey2.
            Or token hash (v12.2+) with `?authHash=True`.
          schema:
            type: string
        - name: user
          in: path
          required: true
          description: Username
          schema:
            type: string
        - name: permission
          in: path
          required: true
          description: Permission bitmask. Use 2 for Web (short-lived) or 4 for App (long-lived).
          schema:
            type: integer
            enum: [2, 4]
            example: 4
        - name: uuid
          in: path
          required: true
          description: |
            Client UUID identifying the requesting device/app. Format: `xxxxxxxx-xxxx-xxxx-xxxxxxxxxxxx`.
            Generate once per device and persist. Used for token tracking on the Miniserver.
          schema:
            type: string
            example: "098802e1-02b4-603c-ffffeee000d80cfd"
        - name: info
          in: path
          required: true
          description: URL-encoded human-readable client description (e.g. `MyApp%20v1.0`)
          schema:
            type: string
            example: "TaftekApp%20v1.0"
        - name: authHash
          in: query
          description: Set to `True` when using a token hash instead of a password hash (v12.2+)
          schema:
            type: string
            enum: ["True"]
        - name: tokenHash
          in: query
          description: Set to `true` to receive a hashed token in the response (v12.2.10.6+)
          schema:
            type: string
            enum: ["true"]
      responses:
        '200':
          description: JWT token acquired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/getjwt/..."
                  value:
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    validUntil: 2345678901
                    tokenRights: 6
                    unsecurePass: false
                    key: "3a4f5e6b7c..."
                  Code: "200"
        '400':
          description: Bad request — unencrypted getjwt rejected

  /jdev/sys/refreshjwt/{tokenHash}/{user}:
    get:
      operationId: refreshJwt
      summary: Refresh JWT Token
      description: |
        Extend the lifespan of an existing valid JWT token.
        Returns a new token with identical permissions and updated `validUntil`.

        When passing a legacy token, a proper JWT is returned.

        Since v11.2: `tokenHash` can be the plaintext token instead of an HMAC hash.

        **tokenHash creation (< v11.2):**
        `tokenHash = HMAC-SHA256(token, key-from-getkey)` → hex
      tags: [Authentication]
      parameters:
        - name: tokenHash
          in: path
          required: true
          description: HMAC hash of the token, or plaintext token (v11.2+)
          schema:
            type: string
        - name: user
          in: path
          required: true
          description: Username whose token is being refreshed
          schema:
            type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/refreshjwt/..."
                  value:
                    token: "eyJhbGci..."
                    validUntil: 2356789012
                    unsecurePass: false
                  Code: "200"
        '401':
          description: Token invalid or expired

  /jdev/sys/checktoken/{tokenHash}/{user}:
    get:
      operationId: checkToken
      summary: Check Token Validity
      description: |
        Verify a token is still valid without refreshing it.
        Returns `validUntil` and `unsecurePass` flag.
        Returns 401 if the token has expired or is invalid.

        Since v11.2: `tokenHash` can be the plaintext token.
      tags: [Authentication]
      parameters:
        - name: tokenHash
          in: path
          required: true
          description: HMAC hash of the token, or plaintext token (v11.2+)
          schema:
            type: string
        - name: user
          in: path
          required: true
          description: Username
          schema:
            type: string
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/checktoken/..."
                  value:
                    validUntil: 2345678901
                    unsecurePass: false
                  Code: "200"
        '401':
          description: Token invalid or expired

  /jdev/sys/killtoken/{tokenHash}/{user}:
    get:
      operationId: killToken
      summary: Invalidate Token
      description: |
        Explicitly invalidate a token. The token immediately becomes unusable.
        **Recommended:** kill tokens when they are no longer needed to keep the Miniserver's
        token storage clean.

        Since v11.2: `tokenHash` can be the plaintext token.
      tags: [Authentication]
      parameters:
        - name: tokenHash
          in: path
          required: true
          description: HMAC hash of the token, or plaintext token (v11.2+)
          schema:
            type: string
        - name: user
          in: path
          required: true
          description: Username
          schema:
            type: string
      responses:
        '200':
          description: Token killed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  # ─── CONTROLS ────────────────────────────────────────────────────────────────

  /jdev/sps/io/{uuid}/{command}:
    get:
      operationId: sendControlCommand
      summary: Send Control Command
      description: |
        Send a command to any control (function block) identified by its UUID.
        The UUID is obtained from the structure file (`LoxAPP3.json` → `controls[x].uuidAction`).

        **Common commands by control type:**

        | Control Type | Commands |
        |---|---|
        | Switch / Digital output | `On`, `Off`, `Pulse` |
        | Dimmer | `0`–`100` (percent), `+`, `-` |
        | Jalousie / Blinds | `FullUp`, `FullDown`, `Up`, `Down`, `Stop` |
        | Analog output | `0.0`–`1.0` float value |
        | IRoomController | `setOperatingMode/{mode}`, `setTemperature/{temp}` |
        | Timer | `On/{duration_sec}` |

        **HTTP authentication:** append `?autht={tokenHash}&user={user}` to the URL.

        Note: the response value reflects the state after command execution,
        but is not fully reliable — rely on WebSocket state updates instead.
      tags: [Controls]
      parameters:
        - name: uuid
          in: path
          required: true
          description: Control UUID (uuidAction from LoxAPP3.json)
          schema:
            type: string
            example: "0f58e6de-0110-b5ba-ffff-d7c9d24d0000"
        - name: command
          in: path
          required: true
          description: Command string to send
          schema:
            type: string
            example: "On"
        - name: autht
          in: query
          description: Token hash for HTTP authentication
          schema:
            type: string
        - name: user
          in: query
          description: Username for HTTP authentication
          schema:
            type: string
      responses:
        '200':
          description: Command acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sps/io/0f58e6de-0110-b5ba-ffff-d7c9d24d0000/On"
                  value: "1"
                  Code: "200"
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: UUID not found or unrecognized command

  /jdev/sps/ios/{visuHash}/{uuid}/{command}:
    get:
      operationId: sendSecuredControlCommand
      summary: Send Secured Control Command (Visualization Password)
      description: |
        Send a command to a control protected by a **visualization password**.

        **visuHash construction:**
        1. `GET /jdev/sys/getvisusalt/{user}` → key, salt, hashAlg
        2. `visuPwHash = {hashAlg}("{visuPw}:{salt}").toUpperCase()`
        3. `visuHash = HMAC-{hashAlg}(visuPwHash, key)` → hex

        Returns 200 if password correct and command executed. Returns 500 if password wrong.
      tags: [Controls]
      parameters:
        - name: visuHash
          in: path
          required: true
          description: HMAC hash of the visualization password
          schema:
            type: string
        - name: uuid
          in: path
          required: true
          description: Control UUID
          schema:
            type: string
        - name: command
          in: path
          required: true
          description: Command string
          schema:
            type: string
        - name: autht
          in: query
          description: Token hash for HTTP authentication
          schema:
            type: string
        - name: user
          in: query
          description: Username for HTTP authentication
          schema:
            type: string
      responses:
        '200':
          description: Command executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
        '500':
          description: Incorrect visualization password

  # ─── STRUCTURE ───────────────────────────────────────────────────────────────

  /jdev/sps/LoxAPPversion3:
    get:
      operationId: getLoxAppVersion3
      summary: Check Structure File Version
      description: |
        Returns the `lastModified` timestamp of the current Miniserver configuration.

        Compare with the `lastModified` field of your cached `LoxAPP3.json`.
        If they differ, re-download the structure file.

        Call this **immediately after connecting** (WebSocket or HTTP) to validate your cache.
      tags: [Structure]
      responses:
        '200':
          description: Structure file version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sps/LoxAPPversion3"
                  value: "2024-11-20 14:32:01"
                  Code: "200"

  /data/LoxAPP3.json:
    get:
      operationId: downloadStructureFile
      summary: Download Structure File
      description: |
        Download the complete structure file describing the entire Miniserver configuration.

        The structure file contains:
        - `msInfo` — Miniserver metadata (name, serial, firmware)
        - `rooms` — room definitions with UUIDs
        - `cats` — categories with UUIDs
        - `controls` — all function blocks with their UUIDs, states, and sub-controls
        - `lastModified` — ISO timestamp to detect config changes

        **Caching:** cache locally and validate with `/jdev/sps/LoxAPPversion3` before each session.
        The file can be several MB for large installations.

        **This is the primary reference** for mapping control names to UUIDs.
      tags: [Structure]
      responses:
        '200':
          description: Full structure file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoxAPP3'

  # ─── SYSTEM ──────────────────────────────────────────────────────────────────

  /jdev/sps/enablebinstatusupdate:
    get:
      operationId: enableBinStatusUpdate
      summary: Enable Binary State Updates (WebSocket Only)
      description: |
        Subscribe to real-time state updates on the WebSocket connection.

        After sending this command, the Miniserver sends **large initial Event-Tables**
        containing all current states (Value, Text, Daytimer, Weather).

        Subsequently, the Miniserver sends incremental updates only when states change.
        Each update contains a UUID + value pair — use `LoxAPP3.json` to resolve UUIDs to controls.

        **Up to 31 concurrent WebSocket clients** can receive state updates.
        Check `hasEventSlots` in `jdev/cfg/apiKey` before attempting.

        This command is **WebSocket only** — not available over plain HTTP.
      tags: [System]
      responses:
        '200':
          description: Binary state updates enabled. Initial Event-Tables follow.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  # ─── VIRTUAL I/O — BY NAME ───────────────────────────────────────────────────

  /jdev/sps/io/{name}/{value}:
    get:
      operationId: setVirtualInputByName
      summary: Set Virtual Input by Name
      description: |
        Set or pulse a Virtual Input (or any control) addressed by its **name** configured
        in Loxone Config (not UUID). Useful for quick ad-hoc HTTP commands without needing
        to parse the structure file.

        **Digital values:**
        `On` / `1`, `Off` / `0`, `Pulse` / `Impuls`

        **Two-output digital (up/down) values:**
        `PulseUp`, `PulseDown`, `PulseOpen`, `PulseClose`,
        `UpOn`, `UpOff`, `DownOn`, `DownOff`

        **Analog values:**
        Any decimal number, e.g. `21.5`, `-5.2`, `0.75`.
        Range 0–10 for 0-10V inputs, no limit for temperature/analog.
        Decimal separator: dot (`.`)

        **Text values:**
        Any UTF-8 string for Virtual Text Inputs.

        **Status queries (omit value or use `state`/`astate`/`all`):**
        - `/state` — returns current input value
        - `/astate` — returns value at outputs (or `?` if mixed)
        - `/all` — returns all outputs with names and UUIDs

        Spaces in names: use `%20` or URL-encode.
        By name is deprecated in favour of UUID in newer flows, but still widely used.
      tags: [VirtualIO]
      parameters:
        - name: name
          in: path
          required: true
          description: |
            Control or Virtual Input name as defined in Loxone Config.
            Spaces URL-encoded as `%20`. Case-insensitive.
          schema:
            type: string
            example: "LivingroomLight"
        - name: value
          in: path
          required: true
          description: |
            Value to set. Digital: `On`, `Off`, `Pulse`. Analog: decimal. Text: UTF-8 string.
            Status queries: `state`, `astate`, `all`.
          schema:
            type: string
            example: "On"
        - name: autht
          in: query
          description: Token hash for HTTP authentication
          schema:
            type: string
        - name: user
          in: query
          description: Username for HTTP authentication
          schema:
            type: string
      responses:
        '200':
          description: Command acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sps/io/LivingroomLight"
                  value: "1"
                  Code: "200"
        '401':
          description: Unauthorized
        '404':
          description: Control name not found

  /jdev/sps/io/{vtiName}/SET({functionBlock};{input};{value}):
    get:
      operationId: apiConnectorSet
      summary: API Connector — SET Command via Virtual Text Input
      description: |
        Send a `SET()` command through a **Virtual Text Input (VTI)** to control any
        function block by its short name. The primary interface for the Loxone API Connector.

        Used by: Node-RED, PLCs, Touch Pure Flex, custom scripts, external automation systems.

        **URL format:**
        ```
        /jdev/sps/io/{VTI_name}/SET({FunctionBlock};{Input};{Value})
        ```

        **Parameters:**
        - `FunctionBlock` — short name of the block (visible under ℹ in Config). Examples: `Lico`, `SW`, `IR`
        - `Input` — input abbreviation. Common: `On`, `Off`, `Tg` (toggle), `Mood`, `T` (temperature)
        - `Value` — `pulse`, `On`, `Off`, `1`, `0`, or a float

        **Example commands:**
        | Action | Command |
        |---|---|
        | Lights on | `SET(Lico;On;pulse)` |
        | Lights off | `SET(Lico;Off;pulse)` |
        | Toggle switch | `SET(SW;Tg;pulse)` |
        | Set temperature | `SET(IR;T;22.5)` |
        | Select mood | `SET(Lico;Mood;2)` |

        **Chaining commands** (Touch Pure Flex only):
        `=SET(SW;Tg;pulse)&SET(Lico;On;pulse)`

        The entire command including `SET(...)` must be URL-encoded.
      tags: [VirtualIO]
      parameters:
        - name: vtiName
          in: path
          required: true
          description: Name of the Virtual Text Input in Loxone Config
          schema:
            type: string
            example: "APIConnector"
        - name: functionBlock
          in: path
          required: true
          description: Short name of the target function block
          schema:
            type: string
            example: "Lico"
        - name: input
          in: path
          required: true
          description: Input abbreviation
          schema:
            type: string
            example: "On"
        - name: value
          in: path
          required: true
          description: Value to send
          schema:
            type: string
            example: "pulse"
        - name: autht
          in: query
          schema:
            type: string
        - name: user
          in: query
          schema:
            type: string
      responses:
        '200':
          description: SET command executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sps/io/APIConnector/SET(Lico;On;pulse)"
                  value: "1"
                  Code: "200"
        '401':
          description: Unauthorized
        '404':
          description: VTI name not found

  /status:
    get:
      operationId: getStatus
      summary: Full Device Status (XML)
      description: |
        Returns XML listing all devices connected to the Miniserver along with their
        IP configuration, MAC address, firmware version, and online status.
        Also enumerates extensions.
      tags: [VirtualIO]
      security: []
      responses:
        '200':
          description: XML status document
          content:
            application/xml:
              schema:
                type: string
                description: |
                  `<Status Modified="..."><Miniserver Name="..." IP="..." MAC="..." Version="...">
                  <Extension Name="..." Serial="..." Version="..." Online="..."/></Miniserver></Status>`

  # ─── SYSTEM — PLC CONTROL ────────────────────────────────────────────────────

  /jdev/sps/state:
    get:
      operationId: getPlcState
      summary: Get PLC State
      description: |
        Returns the current state of the Miniserver PLC as an integer 0–8.

        | Value | State |
        |---|---|
        | 0 | No status |
        | 1 | PLC booting |
        | 2 | PLC program loaded |
        | 3 | PLC started |
        | 4 | Loxone Link started |
        | 5 | PLC running ✅ |
        | 6 | PLC change in progress |
        | 7 | PLC error ❌ |
        | 8 | Update occurring |
      tags: [System]
      responses:
        '200':
          description: PLC state code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sps/state"
                  value: "5"
                  Code: "200"

  /jdev/sps/status:
    get:
      operationId: getPlcStatus
      summary: Get PLC Frequency / Status
      description: Returns the current PLC cycle frequency in Hz.
      tags: [System]
      responses:
        '200':
          description: PLC cycle frequency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sps/restart:
    get:
      operationId: restartPlc
      summary: Restart PLC
      description: |
        Restart the PLC logic without rebooting the Miniserver hardware.
        Requires **SysWS** permission (`0x00000100`).
      tags: [System]
      responses:
        '200':
          description: PLC restarting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
        '403':
          description: Insufficient permissions (SysWS required)

  /jdev/sps/stop:
    get:
      operationId: stopPlc
      summary: Stop PLC
      description: Stop PLC execution. Requires **SysWS** permission.
      tags: [System]
      responses:
        '200':
          description: PLC stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sps/run:
    get:
      operationId: runPlc
      summary: Resume PLC
      description: Resume PLC execution after a stop. Requires **SysWS** permission.
      tags: [System]
      responses:
        '200':
          description: PLC running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sps/enumdev:
    get:
      operationId: enumDevices
      summary: List PLC Devices
      description: List all PLC devices — Miniserver and all connected extensions.
      tags: [System]
      responses:
        '200':
          description: Device enumeration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sps/enumin:
    get:
      operationId: enumInputs
      summary: List PLC Inputs
      description: List all PLC inputs.
      tags: [System]
      responses:
        '200':
          description: Input enumeration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sps/enumout:
    get:
      operationId: enumOutputs
      summary: List PLC Outputs
      description: List all PLC outputs.
      tags: [System]
      responses:
        '200':
          description: Output enumeration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  # ─── SYSTEM — CONFIGURATION ──────────────────────────────────────────────────

  /jdev/cfg/version:
    get:
      operationId: getFirmwareVersion
      summary: Get Firmware Version
      description: Returns the current Miniserver firmware version string.
      tags: [System]
      security: []
      responses:
        '200':
          description: Firmware version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/cfg/version"
                  value: "17.0.12.11"
                  Code: "200"

  /jdev/cfg/mac:
    get:
      operationId: getMacAddress
      summary: Get MAC Address
      description: Returns the Miniserver MAC address (= serial number).
      tags: [System]
      security: []
      responses:
        '200':
          description: MAC address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/cfg/mac"
                  value: "50:4F:94:A1:B2:C3"
                  Code: "200"

  /jdev/cfg/ip:
    get:
      operationId: getIpAddress
      summary: Get / Set IP Address
      description: |
        Without value: returns current IP address.
        With value: sets IP address. Requires **Admin** permission.

        Example set: `/jdev/cfg/ip/192.168.1.100`
      tags: [System]
      responses:
        '200':
          description: IP address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/cfg/dhcp:
    get:
      operationId: getDhcp
      summary: Get / Set DHCP
      description: Returns or sets DHCP enabled state (`1`/`0`). Requires Admin.
      tags: [System]
      responses:
        '200':
          description: DHCP state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/cfg/device:
    get:
      operationId: getDeviceName
      summary: Get / Set Device Name
      description: Returns or sets the Miniserver display name configured in Loxone Config.
      tags: [System]
      responses:
        '200':
          description: Device name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/cfg/ntp:
    get:
      operationId: getNtp
      summary: Get / Set NTP Server
      description: Returns or sets the NTP server address. Requires Admin.
      tags: [System]
      responses:
        '200':
          description: NTP server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  # ─── SYSTEM — MONITORING ─────────────────────────────────────────────────────

  /jdev/sys/cpu:
    get:
      operationId: getCpuLoad
      summary: Get CPU Load
      description: Returns current CPU usage as a percentage (0–100).
      tags: [System]
      responses:
        '200':
          description: CPU load %
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/cpu"
                  value: "12"
                  Code: "200"

  /jdev/sys/heap:
    get:
      operationId: getHeapUsage
      summary: Get Memory Usage
      description: Returns free heap memory in bytes.
      tags: [System]
      responses:
        '200':
          description: Free heap memory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sys/numtasks:
    get:
      operationId: getNumTasks
      summary: Get Number of Tasks
      description: Returns the number of active system tasks.
      tags: [System]
      responses:
        '200':
          description: Task count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  # ─── SYSTEM — DATE / TIME ────────────────────────────────────────────────────

  /jdev/sys/date:
    get:
      operationId: getDate
      summary: Get System Date
      description: Returns the Miniserver local date.
      tags: [System]
      responses:
        '200':
          description: Local date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/date"
                  value: "2026-06-11"
                  Code: "200"

  /jdev/sys/time:
    get:
      operationId: getTime
      summary: Get System Time
      description: Returns the Miniserver local time.
      tags: [System]
      responses:
        '200':
          description: Local time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
              example:
                LL:
                  control: "dev/sys/time"
                  value: "14:32:01"
                  Code: "200"

  /jdev/sys/setdatetime/{datetime}:
    get:
      operationId: setDateTime
      summary: Set System Date & Time
      description: |
        Set system date and time. Requires **Admin** permission.

        Accepted formats:
        - `YYYY-MM-DD HH:MM:SS`
        - `DD/MM/YYYY HH:MM:SS`

        Example: `/jdev/sys/setdatetime/2026-06-11%2014:32:00`
      tags: [System]
      parameters:
        - name: datetime
          in: path
          required: true
          description: Date-time string (URL-encoded). Format `YYYY-MM-DD HH:MM:SS`.
          schema:
            type: string
            example: "2026-06-11%2014:32:00"
      responses:
        '200':
          description: Date/time set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sys/ntp:
    get:
      operationId: forceNtp
      summary: Force NTP Sync
      description: Force an immediate NTP time synchronization request.
      tags: [System]
      responses:
        '200':
          description: NTP sync triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  # ─── SYSTEM — CONTROL & FILES ─────────────────────────────────────────────────

  /jdev/sys/reboot:
    get:
      operationId: rebootMiniserver
      summary: Reboot Miniserver
      description: |
        Perform a full hardware reboot of the Miniserver.
        Requires **SysWS** permission (`0x00000100`).

        ⚠ All active WebSocket connections will be terminated.
        Reconnect after ~60 seconds (Gen 2) or ~90 seconds (Gen 1).
      tags: [System]
      responses:
        '200':
          description: Reboot initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
        '403':
          description: Insufficient permissions (SysWS required)

  /jdev/sys/wsextension/{serial}/Reboot:
    get:
      operationId: rebootExtension
      summary: Reboot Extension
      description: |
        Reboot a specific Loxone extension (Tree, Air, RS485, etc.) by serial number.
        Serial number without colons.
      tags: [System]
      parameters:
        - name: serial
          in: path
          required: true
          description: Extension serial number (without colons, e.g. `504F94B1C2D3`)
          schema:
            type: string
      responses:
        '200':
          description: Extension reboot initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sys/check:
    get:
      operationId: checkConnections
      summary: Check Active Connections
      description: Returns the number and info about currently active connections to the Miniserver.
      tags: [System]
      responses:
        '200':
          description: Active connection info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sys/logoff:
    get:
      operationId: logoffAll
      summary: Log Off All Connections
      description: Forcibly disconnect all active connections. Requires **Admin** permission.
      tags: [System]
      responses:
        '200':
          description: All connections terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sys/sdtest:
    get:
      operationId: sdTest
      summary: Test SD Card
      description: Run an SD card read/write integrity test. Returns pass/fail status.
      tags: [System]
      responses:
        '200':
          description: SD card test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /jdev/sys/updatetolatestrelease:
    get:
      operationId: updateFirmware
      summary: Trigger Firmware Update
      description: |
        Trigger an over-the-air firmware update to the latest stable release.
        Requires **TriggerUpdate** permission (`0x00008000`).

        ⚠ Miniserver will reboot during the update.
      tags: [System]
      responses:
        '200':
          description: Update triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'
        '403':
          description: Insufficient permissions

  # ─── SYSTEM — FILE SYSTEM ─────────────────────────────────────────────────────

  /dev/fslist/{path}:
    get:
      operationId: listDirectory
      summary: List SD Card Directory
      description: |
        List the contents of a directory on the Miniserver SD card.
        Use `/dev/fslist/` for the root directory.

        Example: `/dev/fslist/log/` lists the log directory.

        Note: use `dev/` prefix (not `jdev/`) — returns XML.
      tags: [System]
      parameters:
        - name: path
          in: path
          required: false
          description: Directory path (empty for root). Trailing slash required.
          schema:
            type: string
            example: "log/"
      responses:
        '200':
          description: Directory listing (XML)
          content:
            application/xml:
              schema:
                type: string

  /dev/fsget/{filepath}:
    get:
      operationId: getFile
      summary: Download File from SD Card
      description: |
        Download a file from the Miniserver SD card.

        Common paths:
        - `log/def.log` — current Miniserver log file
        - `prog/Loxone.xml` — current configuration XML
        - `stats/...` — statistics files

        Note: use `dev/` prefix (not `jdev/`).
      tags: [System]
      parameters:
        - name: filepath
          in: path
          required: true
          description: Path to the file on SD card
          schema:
            type: string
            example: "log/def.log"
      responses:
        '200':
          description: File content (binary or text depending on file type)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string

  /dev/fsdel/{filepath}:
    get:
      operationId: deleteFile
      summary: Delete File from SD Card
      description: |
        Delete a file from the Miniserver SD card.
        Requires **Admin** permission. Use with caution.

        Note: use `dev/` prefix (not `jdev/`).
      tags: [System]
      parameters:
        - name: filepath
          in: path
          required: true
          description: Path to the file to delete
          schema:
            type: string
            example: "log/old.log"
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  /data/status:
    get:
      operationId: getDataStatus
      summary: System State (XML)
      description: Returns system state information in XML format. Includes basic runtime stats.
      tags: [System]
      responses:
        '200':
          description: XML system state
          content:
            application/xml:
              schema:
                type: string

  /jdev/sys/sendwebservice:
    get:
      operationId: sendWebservice
      summary: Send External Web Service Request
      description: |
        Instructs the Miniserver to send an HTTP request to an external device or service.
        Useful for triggering webhooks or controlling other LAN devices from Loxone logic.

        JSON body parameter:
        ```json
        {
          "address": "192.168.1.70",
          "webservice": "/monitor/logs/lwsd"
        }
        ```
      tags: [System]
      parameters:
        - name: json
          in: query
          required: true
          description: JSON object with `address` and `webservice` fields
          schema:
            type: string
            example: '{"address":"192.168.1.70","webservice":"/monitor/logs/lwsd"}'
      responses:
        '200':
          description: Web service request sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLResponse'

  # ─── CLOUD DNS ───────────────────────────────────────────────────────────────

  /getip:
    get:
      operationId: cloudDnsGetIp
      summary: Resolve Miniserver External Address
      description: |
        **Served by `connect.loxonecloud.com`** — not the Miniserver itself.

        Returns the current external address under which the Miniserver is reachable.
        Works for both port-forwarded CloudDNS Miniservers and Remote Connect (V17.0+) tunnels.

        **Deprecated alternative (works until end of 2026):**
        `https://dns.loxonecloud.com/?getip&snr={serial}&json=true`

        **Local TLS trick** — connect locally with a valid CloudDNS certificate:
        1. Resolve external address to learn the port
        2. Construct hostname from **local** IP: `192-168-1-77.{serial}.dyndns.loxonecloud.com:{port}`
        (dots in IP → dashes)

        **Legacy CloudDNS `Code` values:**
        | Code | Meaning |
        |---|---|
        | 200 | OK — address resolved |
        | 403 | Not registered / CloudDNS disabled |
        | 405 | Miniserver not reporting to CloudDNS |
        | 409 | Insecure password — external access blocked |
        | 412 | Port not opened |
        | 418 | Denied — see `responseJSON` |
        | 481 | Could not reach remote connect service |
        | 482 | Remote connect timeout |
        | 483 | Scheduled restart in progress |
      tags: [CloudDNS]
      security: []
      servers:
        - url: https://connect.loxonecloud.com
          description: Loxone Cloud DNS / Remote Connect resolver
      parameters:
        - name: snr
          in: query
          required: true
          description: Miniserver serial number, no colons (e.g. `504F94A1B2C3`)
          schema:
            type: string
            example: "504F94A1B2C3"
      responses:
        '200':
          description: Resolved address
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: "https://195-201-222-243.504f94a1b2c3.dyndns.loxonecloud.com:48284"
        '400':
          description: Invalid serial format or missing snr parameter
        '404':
          description: Serial not found or no working relay available
        '504':
          description: Miniserver configured but not connected to any relay

  /{serialNumber}:
    get:
      operationId: cloudDnsRedirect
      summary: Redirect to Miniserver Address
      description: |
        **Served by `connect.loxonecloud.com`** — not the Miniserver itself.

        Returns HTTP 307 redirect (Location header) to the address where the Miniserver
        is currently reachable. Convenient for browsers and simple HTTP clients that
        follow redirects automatically.
      tags: [CloudDNS]
      security: []
      servers:
        - url: https://connect.loxonecloud.com
          description: Loxone Cloud DNS / Remote Connect resolver
      parameters:
        - name: serialNumber
          in: path
          required: true
          description: Miniserver serial number, no colons
          schema:
            type: string
            example: "504F94A1B2C3"
      responses:
        '307':
          description: Redirect via Location header to current Miniserver address
          headers:
            Location:
              schema:
                type: string
                example: "https://195-201-222-243.504f94a1b2c3.dyndns.loxonecloud.com:48284/"
        '400':
          description: Invalid serial format
        '404':
          description: Serial not found or no relay available
        '500':
          description: Internal server error
        '504':
          description: Miniserver configured but not connected to any relay

components:
  schemas:

    LLResponse:
      type: object
      description: Standard Loxone JSON envelope. All responses use this wrapper.
      properties:
        LL:
          type: object
          required: [control, value, Code]
          properties:
            control:
              type: string
              description: Echo of the received command path (uses `dev/` not `jdev/`)
              example: "dev/sps/io/0f58e6de.../On"
            value:
              description: Response payload — string, number, or object depending on endpoint
            Code:
              type: string
              description: HTTP-style status code as string
              enum: ["200", "400", "401", "403", "404", "406", "409", "423", "429", "500", "503", "901"]

    ApiKeyResponse:
      type: object
      description: Response from /jdev/cfg/apiKey
      properties:
        LL:
          type: object
          properties:
            control:
              type: string
            value:
              type: object
              properties:
                snr:
                  type: string
                  description: Miniserver serial number (MAC-based)
                  example: "504F94A1B2C3"
                version:
                  type: string
                  description: Firmware version string
                  example: "17.0.12.11"
                httpsStatus:
                  type: integer
                  description: "`1` = HTTPS available; `2` = certificate expired; absent = HTTP only"
                  enum: [1, 2]
                local:
                  type: boolean
                  description: "True if the Miniserver considers this a local connection (since v12.1)"
                hasEventSlots:
                  type: boolean
                  description: "True if WebSocket event slots are available (max 31 concurrent)"
            Code:
              type: string

    LoxAPP3:
      type: object
      description: |
        Loxone Miniserver structure file. The central reference for all integrations.
        Map control names ↔ UUIDs using `controls[x].uuidAction`.
      properties:
        lastModified:
          type: string
          description: ISO 8601 timestamp of the last configuration change
          example: "2024-11-20 14:32:01"
        msInfo:
          type: object
          description: Miniserver metadata
          properties:
            serialNr:
              type: string
            msName:
              type: string
            projectName:
              type: string
            localUrl:
              type: string
            remoteUrl:
              type: string
            tempUnit:
              type: integer
              description: "0 = Celsius, 1 = Fahrenheit"
            currency:
              type: string
            squareMeasure:
              type: string
            location:
              type: string
            languageCode:
              type: string
            heatPeriodStart:
              type: string
            heatPeriodEnd:
              type: string
            coolPeriodStart:
              type: string
            coolPeriodEnd:
              type: string
            catTitle:
              type: string
            roomTitle:
              type: string
        rooms:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Room'
          description: Map of room UUID → room definition
        cats:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Category'
          description: Map of category UUID → category definition
        controls:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Control'
          description: Map of control UUID → control definition

    Room:
      type: object
      properties:
        uuid:
          type: string
          example: "0a3cc5e4-0110-b5ba-ffff-d7c9d24d0000"
        name:
          type: string
          example: "Living Room"
        image:
          type: string
          example: "00000000-0000-0032-2000000000000000"
        defaultRating:
          type: integer

    Category:
      type: object
      properties:
        uuid:
          type: string
        name:
          type: string
          example: "Lighting"
        image:
          type: string
        type:
          type: string
          example: "lights"

    Control:
      type: object
      description: A Loxone control / function block
      properties:
        name:
          type: string
          example: "Ceiling Light"
        type:
          type: string
          description: |
            Control type name. Common types:
            `Switch`, `Dimmer`, `Jalousie`, `Gate`, `Alarm`,
            `IRoomControllerV2`, `TimedSwitch`, `Pushbutton`,
            `UpDownDigital`, `InfoOnlyAnalog`, `InfoOnlyDigital`,
            `Meter`, `IRCV2Daytimer`, `AalSmartAlarm`
          example: "Switch"
        uuidAction:
          type: string
          description: UUID for sending commands to this control (use in `/jdev/sps/io/{uuid}/`)
          example: "0f58e6de-0110-b5ba-ffff-d7c9d24d0000"
        room:
          type: string
          description: UUID of the room this control belongs to
        cat:
          type: string
          description: UUID of the category
        defaultRating:
          type: integer
        isFavorite:
          type: boolean
        isSecured:
          type: boolean
          description: True if visualization password is required
        states:
          type: object
          additionalProperties:
            type: string
          description: |
            Map of state name → UUID.
            These UUIDs appear in WebSocket Event-Table updates.
            Example: `{"active": "0f58e6de-0110-b5ba-0000-d7c9d24d0000"}`
        subControls:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Control'
          description: Child controls (e.g. individual outputs of a multi-channel control)

  securitySchemes:
    TokenAuth:
      type: apiKey
      in: query
      name: autht
      description: |
        JWT token hash for HTTP request authentication.
        Must be used together with the `user` query parameter.

        `tokenHash = HMAC-SHA256(jwtToken, key-from-getkey)` → hex
        or plaintext token (Miniserver v11.2+).

        ## Permission Bitmask Reference

        | Hex | Name | Description |
        |-----|------|-------------|
        | 0x00000001 | Admin | Administrative rights |
        | 0x00000002 | Web | Short-lived web token |
        | 0x00000004 | App | Long-lived app token |
        | 0x00000008 | Config | Loxone Config login |
        | 0x00000010 | FTP | FTP access |
        | 0x00000020 | EditUser | Change own password / NFC / codes |
        | 0x00000040 | ExpertMode | Expert mode |
        | 0x00000080 | OpModes | Change operating mode schedule |
        | 0x00000100 | SysWS | System-level web services (e.g. reboot) |
        | 0x00000200 | AD | Automatic designer rules/scenes |
        | 0x00000400 | AdoptUI | Edit non-logic properties |
        | 0x00000800 | UserMgmt | Add/remove/edit users |
        | 0x00001000 | DeviceMgmt | Air/Tree device search |
        | 0x00002000 | PluginMgmt | Manage Miniserver plugins (e.g. HomeKit) |
        | 0x00004000 | TrustJwtAuth | Login via JWT on trusted Miniserver (v14.5+) |
        | 0x00008000 | TriggerUpdate | Trigger firmware update |
        | 0x00010000 | TriggerBackup | Trigger backup |

    UserParam:
      type: apiKey
      in: query
      name: user
      description: Username (always pair with `autht`)

security:
  - TokenAuth: []
    UserParam: []
